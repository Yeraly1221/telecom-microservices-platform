spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5437/reporting_db}
    username: ${DB_USERNAME:reporting_user}
    password: ${DB_PASSWORD:reporting_pass}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
